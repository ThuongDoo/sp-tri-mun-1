<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loading...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="./data.js"></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap");
      body {
        font-family: "Inter", system-ui, sans-serif;
      }
      .heading-font {
        font-family: "Playfair Display", sans-serif;
      }
      .hero-bg {
        background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      }
      .card-hover {
        transition: all 0.3s;
      }
      .card-hover:hover {
        transform: translateY(-8px);
        box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
      }
      .section-padding {
        padding: 3.5rem 1rem;
      }
      @media (min-width: 768px) {
        .section-padding {
          padding: 5rem 1rem;
        }
      }
      .sticky-cta {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 50;
      }
      .accordion-content {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.3s ease;
      }
    </style>
  </head>
  <!-- // TODO: Thay tên thương hiệu, số điện thoại, link Zalo/Mess, ảnh thật của bạn
  vào data.js -->

  <body class="bg-zinc-50 text-zinc-800" x-data="CLIENT">
    <!-- HEADER -->
    <header class="bg-white shadow-sm sticky top-0 z-40">
      <div
        class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center"
      >
        <div class="flex items-center gap-3">
          <div
            class="w-9 h-9 bg-emerald-500 rounded-xl flex items-center justify-center text-white font-bold text-2xl"
          >
            🌿
          </div>
          <h1
            class="text-2xl font-bold text-emerald-700 heading-font"
            x-text="brand"
          ></h1>
        </div>
        <nav class="hidden md:flex gap-6 text-sm font-medium">
          <template x-for="link in nav.links" :key="link.href">
            <a :href="link.href" class="hover:text-emerald-600" x-text="link.label"></a>
          </template>
        </nav>
        <div class="flex items-center gap-3">
          <a
            x-bind:href="zalo"
            target="_blank"
            class="text-emerald-600 hover:text-emerald-700"
            ><i class="fab fa-whatsapp text-xl"></i
          ></a>
          <a
            x-bind:href="messenger"
            target="_blank"
            class="text-emerald-600 hover:text-emerald-700"
            ><i class="fab fa-facebook-messenger text-xl"></i
          ></a>
          <button
            onclick="scrollToForm()"
            class="bg-emerald-600 text-white px-5 py-2 rounded-full font-medium text-sm hover:bg-emerald-700 transition"
            x-text="nav.cta"
          ></button>
        </div>
      </div>
    </header>

    <!-- HERO -->
    <section class="hero-bg text-white">
      <div
        class="max-w-7xl mx-auto grid md:grid-cols-2 gap-8 items-center px-4 pt-12 pb-16"
      >
        <!-- Left -->
        <div class="space-y-6">
          <div
            class="inline-flex items-center gap-2 bg-white/20 backdrop-blur px-4 py-1.5 rounded-full text-sm"
          >
            <span
              class="w-2 h-2 bg-green-400 rounded-full animate-pulse"
            ></span>
            <span x-text="hero.badge"></span>
          </div>
          <h1
            class="heading-font text-4xl md:text-5xl lg:text-6xl leading-tight font-bold"
          >
            <span x-text="hero.headline1"></span><br />
            <span class="text-emerald-200" x-text="hero.headline2"></span>
          </h1>
          <p class="text-lg md:text-xl text-emerald-100 max-w-md">
            <span x-text="hero.subtext"></span><br />
            <strong x-text="hero.subCta"></strong>
          </p>
          <div class="flex flex-wrap gap-4">
            <button
              onclick="scrollToForm()"
              class="bg-white text-emerald-700 px-8 py-4 rounded-2xl font-semibold text-lg shadow-lg hover:scale-105 transition flex-1 md:flex-none"
              x-text="hero.ctaBtn"
            ></button>
            <a
              x-bind:href="'tel:' + phone"
              class="border-2 border-white px-6 py-4 rounded-2xl flex items-center gap-2 font-medium"
              x-text="'Gọi ngay ' + hotline"
            >
              📞
            </a>
          </div>
          <div class="flex items-center gap-6 text-sm">
            <div class="flex -space-x-3">
              <img
                src="https://picsum.photos/id/64/32/32"
                class="w-7 h-7 rounded-full ring-2 ring-white"
              />
              <img
                src="https://picsum.photos/id/201/32/32"
                class="w-7 h-7 rounded-full ring-2 ring-white"
              />
              <img
                src="https://picsum.photos/id/202/32/32"
                class="w-7 h-7 rounded-full ring-2 ring-white"
              />
            </div>
            <p x-text="'⭐⭐⭐⭐⭐ ' + hero.rating + ' • ' + reviews + ' ' + hero.ratingLabel"></p>
          </div>
          <div class="flex gap-4 text-xs">
            <template x-for="item in hero.trustItems" :key="item.icon">
              <span class="flex items-center gap-1">
                <i :class="'fas ' + item.icon"></i>
                <span x-text="item.text"></span>
              </span>
            </template>
          </div>
        </div>
        <!-- Right -->
        <div class="relative">
          <img
            src="https://picsum.photos/id/201/600/680"
            class="rounded-3xl shadow-2xl w-full object-cover"
            :alt="'Chị gái da sạch mịn sau trị mụn ' + brand"
          />
          <div
            class="absolute -bottom-6 -left-6 bg-white text-emerald-700 p-4 rounded-2xl shadow-xl"
          >
            <p class="font-bold" x-text="hero.beforeAfterLabel"></p>
            <img
              src="https://picsum.photos/id/237/280/120"
              class="rounded-xl mt-2"
            />
          </div>
          <div
            class="absolute top-6 right-6 bg-white text-zinc-800 px-4 py-2 rounded-2xl flex items-center gap-2 shadow"
          >
            <span class="text-emerald-500 text-3xl">✅</span>
            <div>
              <p class="font-semibold" x-text="hero.testimonialName"></p>
              <p class="text-xs" x-text="hero.testimonialResult"></p>
            </div>
          </div>
        </div>
      </div>
      <!-- Trust bar -->
      <div
        class="bg-white/10 backdrop-blur py-3 text-center text-xs flex flex-wrap justify-center gap-x-8 gap-y-2"
      >
        <template x-for="item in trustBar" :key="item">
          <span x-text="item"></span>
        </template>
      </div>
    </section>

    <!-- PAIN POINTS -->
    <section id="pain" class="section-padding bg-white">
      <div class="max-w-5xl mx-auto text-center">
        <p class="text-emerald-600 font-medium" x-text="pain.label"></p>
        <h2 class="text-3xl font-bold mt-2" x-text="pain.heading"></h2>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-8">
          <template x-for="item in pain.items" :key="item.text">
            <div class="bg-zinc-100 p-5 rounded-2xl card-hover text-center">
              <div class="text-4xl mb-3" x-text="item.emoji"></div>
              <p class="font-semibold" x-text="item.text"></p>
            </div>
          </template>
        </div>
      </div>
    </section>

    <!-- SOLUTION -->
    <section id="solution" class="section-padding bg-emerald-50">
      <div class="max-w-7xl mx-auto px-4">
        <div class="text-center mb-10">
          <h2
            class="text-3xl font-bold"
            x-text="brand + ' ' + solution.headingSuffix"
          ></h2>
          <p class="mt-3 text-zinc-600" x-text="solution.subtitle"></p>
        </div>
        <div class="grid md:grid-cols-3 gap-6">
          <template x-for="card in solution.cards" :key="card.title">
            <div class="bg-white rounded-3xl p-6 shadow relative">
              <div
                x-show="card.badge"
                class="absolute top-4 right-4 bg-rose-500 text-white text-xs px-3 py-1 rounded-full"
                x-text="card.badge"
              ></div>
              <img
                :src="'https://picsum.photos/id/' + card.imgId + '/300/200'"
                class="rounded-2xl w-full"
              />
              <h3 class="font-bold mt-4" x-text="card.title"></h3>
              <p x-show="card.desc" class="text-sm mt-2" x-text="card.desc"></p>
              <p x-show="card.price" class="text-emerald-600 font-semibold" x-text="card.price"></p>
            </div>
          </template>
        </div>
      </div>
    </section>

    <!-- BENEFITS -->
    <section class="section-padding bg-white">
      <div class="max-w-5xl mx-auto px-4">
        <h2 class="text-center text-3xl font-bold mb-8" x-text="benefits.heading"></h2>
        <div class="grid grid-cols-2 md:grid-cols-3 gap-6">
          <template x-for="item in benefits.items" :key="item.title">
            <div class="flex gap-4">
              <span class="text-3xl" x-text="item.emoji"></span>
              <div>
                <p class="font-semibold" x-text="item.title"></p>
                <p x-show="item.sub" class="text-sm text-zinc-600" x-text="item.sub"></p>
              </div>
            </div>
          </template>
        </div>
      </div>
    </section>

    <!-- SOCIAL PROOF -->
    <section id="review" class="section-padding bg-zinc-100">
      <div class="max-w-7xl mx-auto px-4">
        <h2 class="text-center text-3xl font-bold mb-8" x-text="reviewsSection.heading"></h2>
        <div class="grid md:grid-cols-3 gap-6">
          <!-- Review 1 -->
          <div class="bg-white p-5 rounded-3xl">
            <div class="flex justify-between">
              <div>⭐⭐⭐⭐⭐</div>
              <img
                :src="'https://picsum.photos/id/' + reviewsSection.items[0].imgId + '/48/48'"
                class="rounded-full"
              />
            </div>
            <p class="mt-3" x-text="'\"' + reviewsSection.items[0].quote + '\"'"></p>
            <p class="text-xs mt-4" x-text="'— ' + reviewsSection.items[0].author"></p>
            <img
              :src="'https://picsum.photos/id/' + reviewsSection.items[0].afterImgId + '/300/100'"
              class="mt-4 rounded-xl w-full"
            />
          </div>
          <!-- Before & After -->
          <div class="bg-white p-5 rounded-3xl md:col-span-1">
            <p class="font-bold" x-text="reviewsSection.beforeAfterLabel"></p>
            <div class="flex gap-2 mt-3">
              <img
                src="https://picsum.photos/id/180/140/140"
                class="rounded-xl"
              />
              <img
                src="https://picsum.photos/id/201/140/140"
                class="rounded-xl"
              />
            </div>
            <div class="flex justify-between text-xs mt-2">
              <span x-text="reviewsSection.beforeAfterDay1"></span>
              <span class="text-emerald-600 font-bold" x-text="reviewsSection.beforeAfterDay28"></span>
            </div>
            <button
              :onclick="'alert(CLIENT.reviewsSection.beforeAfterMsg)'"
              class="w-full mt-4 bg-emerald-600 text-white py-3 rounded-2xl"
              x-text="reviewsSection.beforeAfterBtn"
            ></button>
          </div>
          <!-- Review 2 -->
          <div class="bg-white p-5 rounded-3xl">
            <p x-text="'\"' + reviewsSection.items[1].quote + '\"'"></p>
            <p class="mt-4 text-xs" x-text="'— ' + reviewsSection.items[1].author"></p>
          </div>
        </div>
        <p
          class="text-center mt-8 text-emerald-600 font-medium"
          x-text="reviewsSection.morePrefix + reviews + reviewsSection.moreSuffix"
        ></p>
      </div>
    </section>

    <!-- PROCESS -->
    <section id="process" class="section-padding bg-white">
      <div class="max-w-5xl mx-auto px-4">
        <h2 class="text-3xl font-bold text-center" x-text="process.heading"></h2>
        <div class="mt-10 grid md:grid-cols-5 gap-4 text-center">
          <div>
            <div
              class="w-12 h-12 mx-auto bg-emerald-100 rounded-full flex items-center justify-center text-2xl font-bold"
            >
              1
            </div>
            <p class="font-medium mt-3" x-text="process.steps[0]"></p>
          </div>
          <div class="hidden md:block text-4xl text-emerald-300">→</div>
          <div>
            <div
              class="w-12 h-12 mx-auto bg-emerald-100 rounded-full flex items-center justify-center text-2xl font-bold"
            >
              2
            </div>
            <p class="font-medium mt-3" x-text="process.steps[1]"></p>
          </div>
          <div class="hidden md:block text-4xl text-emerald-300">→</div>
          <div>
            <div
              class="w-12 h-12 mx-auto bg-emerald-100 rounded-full flex items-center justify-center text-2xl font-bold"
            >
              3
            </div>
            <p class="font-medium mt-3" x-text="process.steps[2]"></p>
          </div>
          <div class="hidden md:block text-4xl text-emerald-300">→</div>
          <div>
            <div
              class="w-12 h-12 mx-auto bg-emerald-100 rounded-full flex items-center justify-center text-2xl font-bold"
            >
              4
            </div>
            <p class="font-medium mt-3" x-text="process.steps[3]"></p>
          </div>
          <div class="hidden md:block text-4xl text-emerald-300">→</div>
          <div>
            <div
              class="w-12 h-12 mx-auto bg-emerald-500 text-white rounded-full flex items-center justify-center text-2xl font-bold"
            >
              5
            </div>
            <p class="font-medium mt-3" x-text="process.steps[4]"></p>
          </div>
        </div>
      </div>
    </section>

    <!-- OFFER -->
    <section
      class="py-8 bg-gradient-to-r from-emerald-600 to-teal-600 text-white text-center"
    >
      <div class="max-w-xl mx-auto px-4">
        <p class="uppercase tracking-widest text-emerald-200" x-text="offer.label"></p>
        <h2 class="text-4xl font-bold mt-2" x-text="offer.heading"></h2>
        <button
          onclick="scrollToForm()"
          class="mt-6 bg-white text-emerald-700 px-10 py-4 text-xl font-bold rounded-3xl shadow-xl hover:bg-amber-300 transition"
          x-text="offer.cta"
        ></button>
      </div>
    </section>

    <!-- FORM -->
    <section id="form" class="section-padding bg-zinc-900 text-white">
      <div class="max-w-2xl mx-auto px-4">
        <div class="bg-white text-zinc-800 rounded-3xl p-8 shadow-2xl">
          <h2 class="text-3xl font-bold text-center" x-text="form.heading"></h2>
          <p class="text-center text-zinc-500 mt-2" x-text="form.subtitle"></p>

          <form
            id="leadForm"
            class="mt-8 space-y-5"
            onsubmit="handleSubmit(event)"
          >
            <div>
              <input
                type="text"
                id="name"
                :placeholder="form.placeholderName"
                class="w-full border rounded-2xl px-5 py-3 focus:outline-none focus:border-emerald-500"
                required
              />
            </div>
            <div class="grid grid-cols-2 gap-4">
              <input
                type="tel"
                id="phone"
                :placeholder="form.placeholderPhone"
                class="w-full border rounded-2xl px-5 py-3 focus:outline-none focus:border-emerald-500"
                required
              />
              <input
                type="email"
                id="email"
                :placeholder="form.placeholderEmail"
              />
            </div>
            <textarea
              id="problem"
              rows="3"
              :placeholder="form.placeholderProblem"
              class="w-full border rounded-2xl px-5 py-3"
            ></textarea>

            <button
              type="submit"
              class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-5 rounded-3xl font-bold text-lg shadow"
              x-text="form.submitBtn"
            ></button>
          </form>

          <div class="flex justify-center gap-8 mt-6 text-xs">
            <div class="flex items-center gap-1">
              <i class="fas fa-lock"></i>
              <span x-text="form.privacyNote"></span>
            </div>
            <div>📍 <span x-text="form.branches"></span></div>
          </div>
        </div>
      </div>
    </section>

    <!-- FAQ -->
    <section class="section-padding bg-white">
      <div class="max-w-3xl mx-auto px-4">
        <h2 class="text-3xl font-bold text-center mb-8" x-text="faq.heading"></h2>
        <div class="space-y-4">
          <template x-for="item in faq.items" :key="item.q">
            <div class="border rounded-2xl overflow-hidden">
              <button
                onclick="toggleFAQ(this)"
                class="w-full px-5 py-4 text-left font-medium flex justify-between"
              >
                <span x-text="item.q"></span>
                <span class="faq-icon">↓</span>
              </button>
              <div class="accordion-content px-5 pb-4 text-zinc-600" x-text="item.a"></div>
            </div>
          </template>
        </div>
      </div>
    </section>

    <!-- FOOTER -->
    <footer class="bg-zinc-900 text-white py-12">
      <div class="max-w-7xl mx-auto px-4 grid md:grid-cols-3 gap-8">
        <div>
          <div class="flex items-center gap-3 text-white">
            <span class="text-3xl">🌿</span>
            <span class="font-bold text-2xl" x-text="brand"></span>
          </div>
          <p class="mt-3 text-zinc-400" x-text="footer.tagline"></p>
          <div class="mt-4 flex gap-4">
            <a x-bind:href="zalo" class="text-3xl" target="_blank">💬</a>
            <a x-bind:href="messenger" class="text-3xl" target="_blank">📘</a>
          </div>
          <p class="text-xs mt-8">
            Hotline:
            <a
              x-bind:href="'tel:' + phone"
              class="underline"
              x-text="hotline"
            ></a>
          </p>
        </div>
        <div class="text-sm space-y-2">
          <p><span>📍</span> <span x-text="address"></span></p>
          <p>© 2026 <span x-text="brand"></span>. <span x-text="footer.copyright"></span></p>
          <p class="text-emerald-400">
            <span x-text="footer.discountLabel"></span> <strong x-text="footer.discountCode"></strong>
          </p>
        </div>
        <div>
          <button
            onclick="window.scrollTo({ top: 0, behavior: 'smooth' })"
            class="bg-zinc-700 hover:bg-emerald-600 px-6 py-3 rounded-full w-full"
            x-text="footer.scrollTopBtn"
          ></button>
          <p class="text-center text-xs mt-6 opacity-50" x-text="footer.footerNote"></p>
        </div>
      </div>
    </footer>

    <!-- FLOATING STICKY CTA (mobile) -->
    <div
      class="md:hidden sticky-cta bg-emerald-600 text-white shadow-2xl rounded-3xl flex items-center justify-between px-4 py-3 w-[92%]"
    >
      <div class="flex-1 text-center">
        <button onclick="scrollToForm()" class="font-bold" x-text="stickyCta"></button>
      </div>
      <button
        onclick="window.location.href = 'tel:' + window.CLIENT.phone"
        class="bg-white text-emerald-600 w-10 h-10 rounded-2xl flex items-center justify-center"
      >
        📞
      </button>
    </div>

    <script>
      function scrollToForm() {
        document.getElementById("form").scrollIntoView({ behavior: "smooth" });
      }

      function handleSubmit(e) {
        e.preventDefault();
        const name = document.getElementById("name").value.trim();
        const phone = document.getElementById("phone").value.trim();

        if (name.length < 3) { alert(CLIENT.alerts.nameError); return; }
        if (phone.length < 9) { alert(CLIENT.alerts.phoneError); return; }

        const btn = e.target.querySelector("[type=submit]");
        const originalText = btn.textContent;
        btn.textContent = "Đang gửi...";
        btn.disabled = true;

        const payload = new URLSearchParams({
          name,
          phone,
          email:   document.getElementById("email").value.trim(),
          problem: document.getElementById("problem").value.trim(),
          source:  window.location.href,
          timestamp: new Date().toLocaleString("vi-VN"),
          sheetId: CLIENT.sheetId || "",
        });

        const finish = () => {
          btn.textContent = originalText;
          btn.disabled = false;
          alert(CLIENT.alerts.successMsg);
          e.target.reset();
        };

        if (CLIENT_CONFIG.scriptUrl && CLIENT.sheetId) {
          fetch(CLIENT_CONFIG.scriptUrl, { method: "POST", mode: "no-cors", body: payload })
            .then(finish)
            .catch(finish);
        } else {
          finish();
        }
      }

      function toggleFAQ(btn) {
        const content = btn.nextElementSibling;
        const icon = btn.querySelector(".faq-icon");

        if (content.style.maxHeight && content.style.maxHeight !== "0px") {
          content.style.maxHeight = "0px";
          icon.textContent = "↓";
        } else {
          document
            .querySelectorAll(".accordion-content")
            .forEach((c) => (c.style.maxHeight = "0px"));
          document
            .querySelectorAll(".faq-icon")
            .forEach((i) => (i.textContent = "↓"));

          content.style.maxHeight = content.scrollHeight + "px";
          icon.textContent = "↑";
        }
      }

      window.addEventListener("scroll", () => {
        if (window.scrollY > 300) {
          document.querySelectorAll("img").forEach((img) => {
            if (img.dataset.src) img.src = img.dataset.src;
          });
        }
      });

      document
        .getElementById("leadForm")
        .addEventListener("keypress", function (e) {
          if (e.key === "Enter") handleSubmit(e);
        });
    </script>
  </body>
</html>
