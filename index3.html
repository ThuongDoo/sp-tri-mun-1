<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loading...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="./data.js"></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap");
      body { font-family: "Inter", system-ui, sans-serif; }
      .heading-font { font-family: "Cormorant Garamond", Georgia, serif; }
      .divider { width: 60px; height: 2px; background: currentColor; margin: 0 auto; }
      .sticky-cta {
        position: fixed; bottom: 20px; left: 50%;
        transform: translateX(-50%); z-index: 50;
      }
      .accordion-content {
        max-height: 0; overflow: hidden;
        transition: max-height 0.35s ease;
      }
      .step-line::after {
        content: ''; position: absolute; top: 50%; left: 100%;
        width: 100%; height: 1px; background: #d1fae5;
      }
    </style>
  </head>

  <body class="bg-stone-50 text-zinc-800" x-data="CLIENT">

    <!-- ══ HEADER ══════════════════════════════════════════════════════════ -->
    <header class="bg-white border-b border-stone-100 sticky top-0 z-40">
      <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
        <a x-bind:href="zalo" target="_blank" class="text-zinc-400 hover:text-emerald-600 text-xl md:text-base">
          <i class="fab fa-whatsapp"></i>
        </a>
        <!-- Center: logo -->
        <div class="flex items-center gap-2">
          <span class="text-xl">🌿</span>
          <span class="heading-font text-2xl font-bold text-zinc-800 tracking-wide" x-text="brand"></span>
        </div>
        <div class="flex items-center gap-4">
          <nav class="hidden md:flex gap-6 text-sm text-zinc-500">
            <template x-for="link in nav.links" :key="link.href">
              <a :href="link.href" class="hover:text-emerald-600 transition" x-text="link.label"></a>
            </template>
          </nav>
          <button onclick="scrollToForm()"
            class="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2 rounded-full text-sm font-medium transition"
            x-text="nav.cta"></button>
        </div>
      </div>
    </header>

    <!-- ══ HERO (centered elegant) ════════════════════════════════════════ -->
    <section class="relative overflow-hidden">
      <img src="https://picsum.photos/id/201/1400/700"
        class="w-full h-[80vh] object-cover object-top" />
      <div class="absolute inset-0 bg-gradient-to-b from-black/60 via-black/40 to-black/70"></div>
      <div class="absolute inset-0 flex flex-col items-center justify-center text-white text-center px-4">
        <div class="inline-flex items-center gap-2 border border-white/40 backdrop-blur-sm px-5 py-2 rounded-full text-sm mb-6">
          <span class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span>
          <span x-text="hero.badge"></span>
        </div>
        <h1 class="heading-font text-5xl md:text-7xl lg:text-8xl font-bold leading-tight max-w-4xl">
          <span x-text="hero.headline1"></span>
          <br />
          <em class="text-emerald-300 not-italic" x-text="hero.headline2"></em>
        </h1>
        <p class="mt-6 text-white/80 text-lg max-w-lg leading-relaxed">
          <span x-text="hero.subtext"></span>
        </p>
        <p class="mt-2 text-emerald-300 font-semibold text-lg" x-text="hero.subCta"></p>
        <div class="flex flex-wrap gap-4 mt-8 justify-center">
          <button onclick="scrollToForm()"
            class="bg-emerald-600 hover:bg-emerald-500 text-white px-10 py-4 rounded-full font-semibold text-lg shadow-lg transition"
            x-text="hero.ctaBtn"></button>
          <a x-bind:href="'tel:' + phone"
            class="border-2 border-white/60 hover:border-white text-white px-7 py-4 rounded-full font-medium transition"
            x-text="'📞 ' + hotline"></a>
        </div>
      </div>
    </section>

    <!-- ══ STATS BAR ═══════════════════════════════════════════════════════ -->
    <section class="bg-white border-b border-stone-100">
      <div class="max-w-4xl mx-auto px-4 py-8 grid grid-cols-3 divide-x divide-stone-100 text-center">
        <div class="px-6">
          <p class="heading-font text-4xl font-bold text-emerald-600">8.700+</p>
          <p class="text-zinc-500 text-sm mt-1">Khách hàng hài lòng</p>
        </div>
        <div class="px-6">
          <p class="heading-font text-4xl font-bold text-emerald-600" x-text="hero.rating"></p>
          <p class="text-zinc-500 text-sm mt-1">Điểm đánh giá trung bình</p>
        </div>
        <div class="px-6">
          <p class="heading-font text-4xl font-bold text-emerald-600">2019</p>
          <p class="text-zinc-500 text-sm mt-1">Năm thành lập &amp; uy tín</p>
        </div>
      </div>
    </section>

    <!-- ══ TRUST BAR ═══════════════════════════════════════════════════════ -->
    <div class="bg-emerald-600 text-white py-2.5 text-xs text-center flex flex-wrap justify-center gap-x-8 gap-y-1">
      <template x-for="item in trustBar" :key="item">
        <span x-text="item"></span>
      </template>
    </div>

    <!-- ══ PAIN ════════════════════════════════════════════════════════════ -->
    <section id="pain" class="py-24 bg-stone-50">
      <div class="max-w-5xl mx-auto px-4 text-center">
        <p class="text-emerald-600 text-sm font-medium uppercase tracking-widest" x-text="pain.label"></p>
        <h2 class="heading-font text-4xl md:text-5xl font-bold mt-3 mb-4" x-text="pain.heading"></h2>
        <div class="divider bg-emerald-500 mb-12"></div>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
          <template x-for="item in pain.items" :key="item.text">
            <div class="bg-white rounded-3xl p-6 shadow-sm border border-stone-100 hover:shadow-md hover:-translate-y-1 transition">
              <div class="text-4xl mb-4" x-text="item.emoji"></div>
              <p class="text-sm font-medium text-zinc-700 leading-snug" x-text="item.text"></p>
            </div>
          </template>
        </div>
      </div>
    </section>

    <!-- ══ SOLUTION ════════════════════════════════════════════════════════ -->
    <section id="solution" class="py-24 bg-white">
      <div class="max-w-6xl mx-auto px-4">
        <div class="text-center mb-14">
          <p class="text-emerald-600 text-sm font-medium uppercase tracking-widest">Dịch vụ nổi bật</p>
          <h2 class="heading-font text-4xl md:text-5xl font-bold mt-3" x-text="brand + ' ' + solution.headingSuffix"></h2>
          <div class="divider bg-emerald-500 mt-4"></div>
          <p class="text-zinc-500 mt-6" x-text="solution.subtitle"></p>
        </div>
        <!-- Featured card (BEST SELLER) large + 2 small -->
        <div class="grid md:grid-cols-3 gap-6">
          <!-- Card 1 small -->
          <div class="bg-stone-50 rounded-3xl overflow-hidden border border-stone-100 hover:shadow-lg transition group">
            <img :src="'https://picsum.photos/id/' + solution.cards[0].imgId + '/400/260'"
              class="w-full object-cover group-hover:scale-105 transition duration-500" />
            <div class="p-6">
              <h3 class="font-bold text-lg" x-text="solution.cards[0].title"></h3>
              <p class="text-sm text-zinc-500 mt-2" x-text="solution.cards[0].desc"></p>
              <button onclick="scrollToForm()" class="mt-4 text-emerald-600 text-sm font-semibold hover:underline">
                Tìm hiểu thêm →
              </button>
            </div>
          </div>
          <!-- Card 3 BEST SELLER — large featured -->
          <div class="md:col-span-1 bg-emerald-600 text-white rounded-3xl overflow-hidden relative hover:shadow-xl transition group">
            <div class="absolute top-4 right-4 bg-white text-emerald-700 text-xs font-black px-3 py-1 rounded-full" x-text="solution.cards[2].badge"></div>
            <img :src="'https://picsum.photos/id/' + solution.cards[2].imgId + '/400/260'"
              class="w-full object-cover opacity-60 group-hover:scale-105 transition duration-500" />
            <div class="p-6">
              <h3 class="font-bold text-xl" x-text="solution.cards[2].title"></h3>
              <p class="text-emerald-200 font-semibold mt-2" x-text="solution.cards[2].price"></p>
              <button onclick="scrollToForm()"
                class="mt-4 bg-white text-emerald-700 px-5 py-2 rounded-full text-sm font-bold hover:bg-emerald-50 transition">
                Đăng ký ngay
              </button>
            </div>
          </div>
          <!-- Card 2 small -->
          <div class="bg-stone-50 rounded-3xl overflow-hidden border border-stone-100 hover:shadow-lg transition group">
            <img :src="'https://picsum.photos/id/' + solution.cards[1].imgId + '/400/260'"
              class="w-full object-cover group-hover:scale-105 transition duration-500" />
            <div class="p-6">
              <h3 class="font-bold text-lg" x-text="solution.cards[1].title"></h3>
              <p class="text-sm text-zinc-500 mt-2" x-text="solution.cards[1].desc"></p>
              <button onclick="scrollToForm()" class="mt-4 text-emerald-600 text-sm font-semibold hover:underline">
                Tìm hiểu thêm →
              </button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- ══ BENEFITS ════════════════════════════════════════════════════════ -->
    <section class="py-24 bg-emerald-50">
      <div class="max-w-5xl mx-auto px-4">
        <div class="text-center mb-12">
          <h2 class="heading-font text-4xl md:text-5xl font-bold" x-text="benefits.heading"></h2>
          <div class="divider bg-emerald-500 mt-4"></div>
        </div>
        <div class="grid md:grid-cols-2 gap-8">
          <template x-for="item in benefits.items" :key="item.title">
            <div class="flex items-start gap-4">
              <div class="w-12 h-12 bg-white rounded-2xl shadow-sm flex items-center justify-center text-xl flex-shrink-0"
                x-text="item.emoji"></div>
              <div class="pt-1">
                <p class="font-semibold text-zinc-800" x-text="item.title"></p>
                <p x-show="item.sub" class="text-sm text-zinc-500 mt-0.5" x-text="item.sub"></p>
              </div>
            </div>
          </template>
        </div>
      </div>
    </section>

    <!-- ══ REVIEWS (quote-forward) ════════════════════════════════════════ -->
    <section id="review" class="py-24 bg-white">
      <div class="max-w-6xl mx-auto px-4">
        <div class="text-center mb-14">
          <h2 class="heading-font text-4xl md:text-5xl font-bold" x-text="reviewsSection.heading"></h2>
          <div class="divider bg-emerald-500 mt-4"></div>
        </div>
        <!-- Featured large quote -->
        <div class="bg-emerald-50 rounded-3xl p-10 md:p-14 text-center max-w-3xl mx-auto border border-emerald-100">
          <div class="heading-font text-8xl text-emerald-200 leading-none select-none mb-4">"</div>
          <p class="text-xl md:text-2xl text-zinc-700 leading-relaxed italic heading-font"
            x-text="reviewsSection.items[0].quote"></p>
          <div class="mt-6 flex items-center justify-center gap-3">
            <img :src="'https://picsum.photos/id/' + reviewsSection.items[0].imgId + '/48/48'"
              class="w-12 h-12 rounded-full ring-4 ring-white shadow" />
            <div class="text-left">
              <p class="font-semibold" x-text="reviewsSection.items[0].author"></p>
              <div class="text-amber-400 text-sm">⭐⭐⭐⭐⭐</div>
            </div>
          </div>
        </div>
        <!-- Before/After + second review -->
        <div class="grid md:grid-cols-2 gap-6 mt-8">
          <div class="bg-stone-50 rounded-3xl p-6 border border-stone-100">
            <p class="font-bold text-emerald-700 mb-4" x-text="reviewsSection.beforeAfterLabel"></p>
            <div class="flex gap-3">
              <div class="flex-1">
                <img src="https://picsum.photos/id/180/280/200" class="rounded-2xl w-full object-cover" />
                <p class="text-xs text-center text-zinc-400 mt-2" x-text="reviewsSection.beforeAfterDay1"></p>
              </div>
              <div class="flex-1">
                <img src="https://picsum.photos/id/201/280/200" class="rounded-2xl w-full object-cover" />
                <p class="text-xs text-center text-emerald-600 font-semibold mt-2" x-text="reviewsSection.beforeAfterDay28"></p>
              </div>
            </div>
            <button :onclick="'alert(CLIENT.reviewsSection.beforeAfterMsg)'"
              class="w-full mt-5 border-2 border-emerald-600 text-emerald-700 hover:bg-emerald-600 hover:text-white py-3 rounded-2xl font-semibold transition"
              x-text="reviewsSection.beforeAfterBtn"></button>
          </div>
          <div class="bg-stone-50 rounded-3xl p-8 border border-stone-100 flex flex-col justify-center">
            <div class="heading-font text-5xl text-emerald-200 leading-none select-none mb-3">"</div>
            <p class="text-zinc-600 leading-relaxed italic" x-text="reviewsSection.items[1].quote"></p>
            <p class="mt-4 text-sm font-semibold text-zinc-500" x-text="'— ' + reviewsSection.items[1].author"></p>
            <div class="text-amber-400 mt-1 text-sm">⭐⭐⭐⭐⭐</div>
          </div>
        </div>
        <p class="text-center mt-10 text-emerald-600 font-medium"
          x-text="reviewsSection.morePrefix + reviews + reviewsSection.moreSuffix"></p>
      </div>
    </section>

    <!-- ══ PROCESS (horizontal connected steps) ═══════════════════════════ -->
    <section id="process" class="py-24 bg-stone-50">
      <div class="max-w-5xl mx-auto px-4">
        <div class="text-center mb-14">
          <h2 class="heading-font text-4xl md:text-5xl font-bold" x-text="process.heading"></h2>
          <div class="divider bg-emerald-500 mt-4"></div>
        </div>
        <!-- Desktop: horizontal -->
        <div class="hidden md:flex items-start justify-between gap-0">
          <template x-for="(step, i) in process.steps" :key="step">
            <div class="flex-1 flex flex-col items-center relative text-center px-2">
              <!-- Connecting line -->
              <div x-show="i < process.steps.length - 1"
                class="absolute top-6 left-1/2 w-full h-0.5 bg-emerald-100" style="z-index:0;"></div>
              <!-- Circle -->
              <div class="relative z-10 w-12 h-12 rounded-full flex items-center justify-center font-black text-lg"
                :class="i === process.steps.length - 1 ? 'bg-emerald-600 text-white' : 'bg-white border-2 border-emerald-200 text-emerald-600 shadow-sm'"
                x-text="i + 1"></div>
              <p class="text-sm font-medium text-zinc-700 mt-3 leading-snug" x-text="step"></p>
            </div>
          </template>
        </div>
        <!-- Mobile: vertical -->
        <div class="md:hidden space-y-6">
          <template x-for="(step, i) in process.steps" :key="step">
            <div class="flex items-center gap-4">
              <div class="w-10 h-10 rounded-full flex items-center justify-center font-black text-sm flex-shrink-0"
                :class="i === process.steps.length - 1 ? 'bg-emerald-600 text-white' : 'bg-emerald-100 text-emerald-700'"
                x-text="i + 1"></div>
              <p class="font-medium text-zinc-700" x-text="step"></p>
            </div>
          </template>
        </div>
      </div>
    </section>

    <!-- ══ OFFER ══════════════════════════════════════════════════════════ -->
    <section class="py-16 bg-white">
      <div class="max-w-3xl mx-auto px-4 text-center border-2 border-emerald-100 rounded-3xl py-14 bg-emerald-50 mx-6 md:mx-auto">
        <p class="text-emerald-600 text-xs font-semibold uppercase tracking-widest" x-text="offer.label"></p>
        <h2 class="heading-font text-4xl md:text-5xl font-bold mt-3 text-zinc-800" x-text="offer.heading"></h2>
        <div class="divider bg-emerald-400 mt-4 mb-8"></div>
        <button onclick="scrollToForm()"
          class="bg-emerald-600 hover:bg-emerald-700 text-white px-12 py-4 rounded-full text-lg font-semibold shadow-lg hover:shadow-emerald-200 transition"
          x-text="offer.cta"></button>
      </div>
    </section>

    <!-- ══ FORM + sidebar ════════════════════════════════════════════════ -->
    <section id="form" class="py-24 bg-stone-50">
      <div class="max-w-5xl mx-auto px-4 grid md:grid-cols-5 gap-10 items-start">
        <!-- Sidebar: 2 cols -->
        <div class="md:col-span-2 space-y-8">
          <div>
            <h2 class="heading-font text-3xl font-bold" x-text="form.heading"></h2>
            <p class="text-zinc-500 mt-2" x-text="form.subtitle"></p>
          </div>
          <div class="space-y-4">
            <template x-for="item in hero.trustItems" :key="item.text">
              <div class="flex items-center gap-3">
                <i :class="'fas ' + item.icon + ' text-emerald-600 w-5 text-center'"></i>
                <span class="text-sm text-zinc-600" x-text="item.text"></span>
              </div>
            </template>
            <div class="flex items-center gap-3">
              <i class="fas fa-map-marker-alt text-emerald-600 w-5 text-center"></i>
              <span class="text-sm text-zinc-600" x-text="form.branches"></span>
            </div>
            <div class="flex items-center gap-3">
              <i class="fas fa-phone text-emerald-600 w-5 text-center"></i>
              <a x-bind:href="'tel:' + phone" class="text-sm font-semibold text-emerald-700 underline" x-text="hotline"></a>
            </div>
          </div>
          <div class="bg-white rounded-2xl p-5 border border-stone-100 shadow-sm">
            <p class="text-xs text-zinc-500 uppercase tracking-wide font-semibold mb-1" x-text="footer.discountLabel"></p>
            <p class="text-xl font-black text-emerald-600" x-text="footer.discountCode"></p>
          </div>
        </div>
        <!-- Form: 3 cols -->
        <div class="md:col-span-3 bg-white rounded-3xl p-8 shadow border border-stone-100">
          <form id="leadForm" class="space-y-4" onsubmit="handleSubmit(event)">
            <input type="text" id="name" :placeholder="form.placeholderName"
              class="w-full border border-stone-200 rounded-2xl px-5 py-3 focus:outline-none focus:border-emerald-500 text-sm" required />
            <div class="grid grid-cols-2 gap-3">
              <input type="tel" id="phone" :placeholder="form.placeholderPhone"
                class="w-full border border-stone-200 rounded-2xl px-5 py-3 focus:outline-none focus:border-emerald-500 text-sm" required />
              <input type="email" id="email" :placeholder="form.placeholderEmail"
                class="w-full border border-stone-200 rounded-2xl px-5 py-3 focus:outline-none focus:border-emerald-500 text-sm" />
            </div>
            <textarea id="problem" rows="3" :placeholder="form.placeholderProblem"
              class="w-full border border-stone-200 rounded-2xl px-5 py-3 focus:outline-none focus:border-emerald-500 text-sm"></textarea>
            <button type="submit"
              class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-4 rounded-2xl font-bold transition"
              x-text="form.submitBtn"></button>
          </form>
          <p class="flex items-center justify-center gap-2 text-xs text-zinc-400 mt-4">
            <i class="fas fa-lock"></i> <span x-text="form.privacyNote"></span>
          </p>
        </div>
      </div>
    </section>

    <!-- ══ FAQ ════════════════════════════════════════════════════════════ -->
    <section class="py-24 bg-white">
      <div class="max-w-3xl mx-auto px-4">
        <div class="text-center mb-12">
          <h2 class="heading-font text-4xl font-bold" x-text="faq.heading"></h2>
          <div class="divider bg-emerald-500 mt-4"></div>
        </div>
        <div class="space-y-3">
          <template x-for="item in faq.items" :key="item.q">
            <div class="border border-stone-200 rounded-2xl overflow-hidden bg-stone-50 hover:bg-white transition">
              <button onclick="toggleFAQ(this)"
                class="w-full px-6 py-5 text-left flex justify-between items-center">
                <span class="font-medium text-zinc-800" x-text="item.q"></span>
                <span class="faq-icon text-emerald-600 font-light text-2xl leading-none ml-4 flex-shrink-0">+</span>
              </button>
              <div class="accordion-content px-6 text-zinc-500 text-sm leading-relaxed" x-text="item.a"></div>
            </div>
          </template>
        </div>
      </div>
    </section>

    <!-- ══ FOOTER ══════════════════════════════════════════════════════════ -->
    <footer class="bg-zinc-900 text-white pt-14 pb-8">
      <div class="max-w-7xl mx-auto px-6 grid md:grid-cols-3 gap-10">
        <div>
          <div class="flex items-center gap-3">
            <span class="text-2xl">🌿</span>
            <span class="heading-font text-2xl font-bold" x-text="brand"></span>
          </div>
          <p class="text-zinc-400 text-sm mt-3 leading-relaxed" x-text="footer.tagline"></p>
          <div class="flex gap-4 mt-5">
            <a x-bind:href="zalo" target="_blank" class="text-2xl opacity-70 hover:opacity-100">💬</a>
            <a x-bind:href="messenger" target="_blank" class="text-2xl opacity-70 hover:opacity-100">📘</a>
          </div>
        </div>
        <div class="text-sm space-y-3 text-zinc-400">
          <p class="flex items-start gap-2"><span>📍</span><span x-text="address"></span></p>
          <p class="flex items-center gap-2">
            <span>📞</span>
            <a x-bind:href="'tel:' + phone" class="underline hover:text-white" x-text="hotline"></a>
          </p>
          <div class="pt-3 border-t border-zinc-800">
            <p class="text-xs text-zinc-500">© 2026 <span x-text="brand"></span>. <span x-text="footer.copyright"></span></p>
          </div>
        </div>
        <div>
          <p class="text-xs text-zinc-500 uppercase tracking-wide mb-2" x-text="footer.discountLabel"></p>
          <p class="text-2xl font-black text-emerald-400" x-text="footer.discountCode"></p>
          <button onclick="window.scrollTo({top:0,behavior:'smooth'})"
            class="mt-6 text-sm border border-zinc-700 hover:border-emerald-500 px-5 py-2.5 rounded-full text-zinc-400 hover:text-white transition"
            x-text="footer.scrollTopBtn"></button>
        </div>
      </div>
    </footer>

    <!-- ══ STICKY CTA (mobile) ════════════════════════════════════════════ -->
    <div class="md:hidden sticky-cta bg-white border border-emerald-200 shadow-2xl rounded-3xl flex items-center gap-3 px-4 py-3 w-[92%]">
      <button onclick="scrollToForm()"
        class="flex-1 text-center text-sm font-semibold text-zinc-800" x-text="stickyCta"></button>
      <button onclick="window.location.href = 'tel:' + window.CLIENT.phone"
        class="bg-emerald-600 text-white w-10 h-10 rounded-2xl flex items-center justify-center flex-shrink-0">📞</button>
    </div>

    <script>
      function scrollToForm() {
        document.getElementById("form").scrollIntoView({ behavior: "smooth" });
      }
      function handleSubmit(e) {
        e.preventDefault();
        const name = document.getElementById("name").value.trim();
        const phone = document.getElementById("phone").value.trim();
        if (name.length < 3) { alert(CLIENT.alerts.nameError); return; }
        if (phone.length < 9) { alert(CLIENT.alerts.phoneError); return; }
        alert(CLIENT.alerts.successMsg);
        e.target.reset();
      }
      function toggleFAQ(btn) {
        const content = btn.nextElementSibling;
        const icon = btn.querySelector(".faq-icon");
        if (content.style.maxHeight && content.style.maxHeight !== "0px") {
          content.style.maxHeight = "0px";
          icon.textContent = "+";
        } else {
          document.querySelectorAll(".accordion-content").forEach(c => c.style.maxHeight = "0px");
          document.querySelectorAll(".faq-icon").forEach(i => i.textContent = "+");
          content.style.maxHeight = content.scrollHeight + "px";
          icon.textContent = "−";
        }
      }
    </script>
  </body>
</html>
