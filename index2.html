<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loading...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="./data.js"></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap");
      body { font-family: "Inter", system-ui, sans-serif; }
      .heading-font { font-family: "Playfair Display", serif; }
      .sticky-cta {
        position: fixed; bottom: 20px; left: 50%;
        transform: translateX(-50%); z-index: 50;
      }
      .accordion-content {
        max-height: 0; overflow: hidden;
        transition: max-height 0.3s ease;
      }
      .fade-in { animation: fadeIn 0.6s ease both; }
      @keyframes fadeIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    </style>
  </head>

  <body class="bg-white text-zinc-900" x-data="CLIENT">

    <!-- ══ HEADER ══════════════════════════════════════════════════════════ -->
    <header class="bg-zinc-900 text-white sticky top-0 z-40 border-b border-zinc-700">
      <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 bg-emerald-500 rounded-lg flex items-center justify-center font-bold">🌿</div>
          <span class="text-xl font-black tracking-tight" x-text="brand"></span>
        </div>
        <nav class="hidden md:flex gap-6 text-sm font-medium text-zinc-300">
          <template x-for="link in nav.links" :key="link.href">
            <a :href="link.href" class="hover:text-emerald-400 transition" x-text="link.label"></a>
          </template>
        </nav>
        <div class="flex items-center gap-3">
          <a x-bind:href="zalo" target="_blank" class="text-zinc-400 hover:text-emerald-400">
            <i class="fab fa-whatsapp text-lg"></i>
          </a>
          <a x-bind:href="messenger" target="_blank" class="text-zinc-400 hover:text-emerald-400">
            <i class="fab fa-facebook-messenger text-lg"></i>
          </a>
          <button onclick="scrollToForm()"
            class="bg-emerald-500 hover:bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm font-bold transition"
            x-text="nav.cta"></button>
        </div>
      </div>
    </header>

    <!-- ══ HERO ════════════════════════════════════════════════════════════ -->
    <section class="bg-zinc-900 text-white">
      <div class="max-w-7xl mx-auto px-4 py-16 grid md:grid-cols-2 gap-12 items-center">
        <!-- Left -->
        <div class="space-y-8">
          <div class="inline-flex items-center gap-2 border border-emerald-500 text-emerald-400 px-4 py-1.5 rounded-full text-sm font-medium">
            <span class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span>
            <span x-text="hero.badge"></span>
          </div>
          <h1 class="heading-font text-5xl md:text-6xl lg:text-7xl font-bold leading-[1.1]">
            <span class="text-zinc-300 text-3xl md:text-4xl block mb-2" x-text="hero.headline1"></span>
            <span class="text-emerald-400" x-text="hero.headline2"></span>
          </h1>
          <p class="text-zinc-400 text-lg leading-relaxed">
            <span x-text="hero.subtext"></span><br />
            <span class="text-white font-semibold" x-text="hero.subCta"></span>
          </p>
          <div class="flex flex-wrap gap-4">
            <button onclick="scrollToForm()"
              class="bg-emerald-500 hover:bg-emerald-400 text-white px-8 py-4 rounded-xl font-bold text-lg transition"
              x-text="hero.ctaBtn"></button>
            <a x-bind:href="'tel:' + phone"
              class="border border-zinc-600 hover:border-emerald-500 px-6 py-4 rounded-xl font-medium text-zinc-300 flex items-center gap-2 transition"
              x-text="'📞 ' + hotline"></a>
          </div>
          <div class="flex items-center gap-4 text-sm text-zinc-400">
            <template x-for="item in hero.trustItems" :key="item.icon">
              <span class="flex items-center gap-1.5">
                <i :class="'fas ' + item.icon + ' text-emerald-500'"></i>
                <span x-text="item.text"></span>
              </span>
            </template>
          </div>
        </div>
        <!-- Right: stacked images -->
        <div class="relative hidden md:block">
          <img src="https://picsum.photos/id/201/560/640"
            class="rounded-2xl w-full object-cover shadow-2xl" />
          <div class="absolute -bottom-5 -left-5 bg-zinc-800 border border-zinc-700 p-4 rounded-2xl shadow-xl flex items-center gap-4">
            <img src="https://picsum.photos/id/64/48/48" class="rounded-full ring-2 ring-emerald-500 w-12 h-12" />
            <div>
              <p class="font-bold text-white" x-text="hero.testimonialName"></p>
              <p class="text-xs text-emerald-400" x-text="hero.testimonialResult"></p>
            </div>
          </div>
          <div class="absolute top-4 right-4 bg-emerald-500 text-white text-sm font-bold px-4 py-2 rounded-xl">
            ⭐ <span x-text="hero.rating"></span>
          </div>
        </div>
      </div>
    </section>

    <!-- ══ STAT STRIP ══════════════════════════════════════════════════════ -->
    <section class="bg-emerald-600 text-white">
      <div class="max-w-5xl mx-auto px-4 py-6 grid grid-cols-2 md:grid-cols-4 gap-6 text-center">
        <div>
          <p class="text-3xl font-black" x-text="reviews + '+'"></p>
          <p class="text-emerald-200 text-sm mt-1">đánh giá 5 sao</p>
        </div>
        <div>
          <p class="text-3xl font-black">28</p>
          <p class="text-emerald-200 text-sm mt-1">ngày thoát mụn</p>
        </div>
        <div>
          <p class="text-3xl font-black">8.700+</p>
          <p class="text-emerald-200 text-sm mt-1">khách đã thành công</p>
        </div>
        <div>
          <p class="text-3xl font-black">6</p>
          <p class="text-emerald-200 text-sm mt-1">tháng bảo hành</p>
        </div>
      </div>
    </section>

    <!-- ══ PAIN ════════════════════════════════════════════════════════════ -->
    <section id="pain" class="py-20 bg-zinc-50">
      <div class="max-w-5xl mx-auto px-4">
        <div class="text-center mb-12">
          <span class="text-emerald-600 font-semibold text-sm uppercase tracking-widest" x-text="pain.label"></span>
          <h2 class="text-3xl md:text-4xl font-black mt-2" x-text="pain.heading"></h2>
        </div>
        <div class="grid md:grid-cols-2 gap-4">
          <template x-for="(item, i) in pain.items" :key="item.text">
            <div class="flex items-start gap-5 bg-white p-6 rounded-2xl border border-zinc-100 hover:border-emerald-200 hover:shadow-md transition">
              <span class="text-4xl font-black text-zinc-100 leading-none select-none" x-text="(i+1).toString().padStart(2,'0')"></span>
              <div class="pt-1">
                <span class="text-2xl" x-text="item.emoji"></span>
                <p class="font-semibold mt-1 text-zinc-800" x-text="item.text"></p>
              </div>
            </div>
          </template>
        </div>
      </div>
    </section>

    <!-- ══ SOLUTION (zigzag) ═══════════════════════════════════════════════ -->
    <section id="solution" class="py-20 bg-white">
      <div class="max-w-6xl mx-auto px-4">
        <div class="text-center mb-14">
          <h2 class="text-3xl md:text-4xl font-black" x-text="brand + ' ' + solution.headingSuffix"></h2>
          <p class="text-zinc-500 mt-3" x-text="solution.subtitle"></p>
        </div>
        <div class="space-y-10">
          <template x-for="(card, i) in solution.cards" :key="card.title">
            <div class="grid md:grid-cols-2 gap-8 items-center"
              :class="i % 2 === 1 ? 'md:[&>:first-child]:order-2' : ''">
              <div class="relative">
                <img :src="'https://picsum.photos/id/' + card.imgId + '/560/380'"
                  class="rounded-2xl w-full object-cover shadow-lg" />
                <div x-show="card.badge"
                  class="absolute top-4 left-4 bg-rose-500 text-white text-xs font-bold px-3 py-1.5 rounded-lg"
                  x-text="card.badge"></div>
              </div>
              <div class="space-y-4 px-2">
                <span class="text-emerald-600 text-sm font-semibold uppercase tracking-wider"
                  x-text="'Giải pháp 0' + (i+1)"></span>
                <h3 class="text-2xl md:text-3xl font-black" x-text="card.title"></h3>
                <p x-show="card.desc" class="text-zinc-500 text-lg" x-text="card.desc"></p>
                <p x-show="card.price"
                  class="text-emerald-600 font-bold text-xl" x-text="card.price"></p>
                <button onclick="scrollToForm()"
                  class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-xl font-semibold transition">
                  Tư vấn ngay →
                </button>
              </div>
            </div>
          </template>
        </div>
      </div>
    </section>

    <!-- ══ BENEFITS (checklist) ════════════════════════════════════════════ -->
    <section class="py-20 bg-emerald-50">
      <div class="max-w-5xl mx-auto px-4">
        <h2 class="text-3xl md:text-4xl font-black text-center mb-12" x-text="benefits.heading"></h2>
        <div class="grid md:grid-cols-2 gap-4">
          <template x-for="item in benefits.items" :key="item.title">
            <div class="flex items-start gap-4 bg-white p-5 rounded-2xl shadow-sm">
              <div class="w-10 h-10 bg-emerald-100 rounded-xl flex items-center justify-center flex-shrink-0 text-xl"
                x-text="item.emoji"></div>
              <div>
                <p class="font-bold text-zinc-800" x-text="item.title"></p>
                <p x-show="item.sub" class="text-sm text-zinc-500 mt-0.5" x-text="item.sub"></p>
              </div>
              <i class="fas fa-check-circle text-emerald-500 ml-auto flex-shrink-0 mt-0.5"></i>
            </div>
          </template>
        </div>
      </div>
    </section>

    <!-- ══ REVIEWS ════════════════════════════════════════════════════════ -->
    <section id="review" class="py-20 bg-zinc-900 text-white">
      <div class="max-w-7xl mx-auto px-4">
        <h2 class="text-3xl md:text-4xl font-black text-center mb-12" x-text="reviewsSection.heading"></h2>
        <div class="grid md:grid-cols-3 gap-6">
          <!-- Review 1 -->
          <div class="bg-zinc-800 rounded-2xl p-6 flex flex-col gap-4">
            <div class="flex gap-1 text-amber-400">⭐⭐⭐⭐⭐</div>
            <p class="text-zinc-300 text-sm leading-relaxed flex-1"
              x-text="'\"' + reviewsSection.items[0].quote + '\"'"></p>
            <div class="flex items-center gap-3 pt-2 border-t border-zinc-700">
              <img :src="'https://picsum.photos/id/' + reviewsSection.items[0].imgId + '/40/40'"
                class="w-10 h-10 rounded-full ring-2 ring-emerald-500" />
              <p class="text-sm font-semibold" x-text="reviewsSection.items[0].author"></p>
            </div>
          </div>
          <!-- Before/After -->
          <div class="bg-zinc-800 rounded-2xl p-6">
            <p class="font-bold text-emerald-400 mb-4" x-text="reviewsSection.beforeAfterLabel"></p>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <img src="https://picsum.photos/id/180/200/180" class="rounded-xl w-full object-cover" />
                <p class="text-xs text-zinc-500 mt-1 text-center" x-text="reviewsSection.beforeAfterDay1"></p>
              </div>
              <div>
                <img src="https://picsum.photos/id/201/200/180" class="rounded-xl w-full object-cover" />
                <p class="text-xs text-emerald-400 mt-1 text-center font-bold" x-text="reviewsSection.beforeAfterDay28"></p>
              </div>
            </div>
            <button :onclick="'alert(CLIENT.reviewsSection.beforeAfterMsg)'"
              class="w-full mt-4 bg-emerald-600 hover:bg-emerald-500 text-white py-3 rounded-xl font-semibold text-sm transition"
              x-text="reviewsSection.beforeAfterBtn"></button>
          </div>
          <!-- Review 2 -->
          <div class="bg-zinc-800 rounded-2xl p-6 flex flex-col gap-4">
            <div class="flex gap-1 text-amber-400">⭐⭐⭐⭐⭐</div>
            <p class="text-zinc-300 text-sm leading-relaxed flex-1"
              x-text="'\"' + reviewsSection.items[1].quote + '\"'"></p>
            <div class="pt-2 border-t border-zinc-700">
              <p class="text-sm font-semibold" x-text="reviewsSection.items[1].author"></p>
            </div>
          </div>
        </div>
        <p class="text-center mt-8 text-emerald-400 font-medium"
          x-text="reviewsSection.morePrefix + reviews + reviewsSection.moreSuffix"></p>
      </div>
    </section>

    <!-- ══ PROCESS (timeline) ═════════════════════════════════════════════ -->
    <section id="process" class="py-20 bg-white">
      <div class="max-w-3xl mx-auto px-4">
        <h2 class="text-3xl md:text-4xl font-black text-center mb-12" x-text="process.heading"></h2>
        <div class="relative">
          <div class="absolute left-6 top-0 bottom-0 w-0.5 bg-emerald-100"></div>
          <div class="space-y-8">
            <template x-for="(step, i) in process.steps" :key="step">
              <div class="flex items-start gap-6 relative">
                <div class="w-12 h-12 rounded-full flex items-center justify-center font-black text-lg flex-shrink-0 z-10"
                  :class="i === process.steps.length - 1 ? 'bg-emerald-600 text-white' : 'bg-emerald-100 text-emerald-700'"
                  x-text="i + 1"></div>
                <div class="bg-zinc-50 rounded-2xl p-5 flex-1 border border-zinc-100">
                  <p class="font-bold text-zinc-800" x-text="step"></p>
                </div>
              </div>
            </template>
          </div>
        </div>
      </div>
    </section>

    <!-- ══ OFFER ══════════════════════════════════════════════════════════ -->
    <section class="py-14 bg-zinc-900 text-white text-center">
      <div class="max-w-xl mx-auto px-4">
        <p class="uppercase tracking-widest text-emerald-400 text-sm font-semibold" x-text="offer.label"></p>
        <h2 class="text-3xl md:text-4xl font-black mt-3" x-text="offer.heading"></h2>
        <button onclick="scrollToForm()"
          class="mt-8 bg-emerald-500 hover:bg-emerald-400 text-white px-10 py-4 text-lg font-bold rounded-2xl shadow-xl transition"
          x-text="offer.cta"></button>
      </div>
    </section>

    <!-- ══ FORM ════════════════════════════════════════════════════════════ -->
    <section id="form" class="py-20 bg-emerald-600 text-white">
      <div class="max-w-5xl mx-auto px-4 grid md:grid-cols-2 gap-12 items-start">
        <!-- Left: trust info -->
        <div class="space-y-6">
          <h2 class="text-3xl font-black" x-text="form.heading"></h2>
          <p class="text-emerald-100" x-text="form.subtitle"></p>
          <ul class="space-y-4 mt-6">
            <template x-for="item in benefits.items.slice(0,4)" :key="item.title">
              <li class="flex items-center gap-3">
                <i class="fas fa-check w-5 h-5 bg-white text-emerald-600 rounded-full flex items-center justify-center text-xs p-1"></i>
                <span class="text-emerald-100 text-sm" x-text="item.title"></span>
              </li>
            </template>
          </ul>
          <div class="pt-6">
            <p class="text-sm text-emerald-200">Hotline:
              <a x-bind:href="'tel:' + phone" class="font-bold text-white underline" x-text="hotline"></a>
            </p>
          </div>
        </div>
        <!-- Right: form -->
        <div class="bg-white text-zinc-800 rounded-3xl p-8 shadow-2xl">
          <form id="leadForm" class="space-y-4" onsubmit="handleSubmit(event)">
            <input type="text" id="name" :placeholder="form.placeholderName"
              class="w-full border border-zinc-200 rounded-xl px-4 py-3 focus:outline-none focus:border-emerald-500" required />
            <input type="tel" id="phone" :placeholder="form.placeholderPhone"
              class="w-full border border-zinc-200 rounded-xl px-4 py-3 focus:outline-none focus:border-emerald-500" required />
            <input type="email" id="email" :placeholder="form.placeholderEmail"
              class="w-full border border-zinc-200 rounded-xl px-4 py-3 focus:outline-none focus:border-emerald-500" />
            <textarea id="problem" rows="3" :placeholder="form.placeholderProblem"
              class="w-full border border-zinc-200 rounded-xl px-4 py-3 focus:outline-none focus:border-emerald-500"></textarea>
            <button type="submit"
              class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-4 rounded-2xl font-bold text-base transition"
              x-text="form.submitBtn"></button>
          </form>
          <p class="text-center text-xs text-zinc-400 mt-4 flex items-center justify-center gap-1">
            <i class="fas fa-lock"></i> <span x-text="form.privacyNote"></span>
          </p>
        </div>
      </div>
    </section>

    <!-- ══ FAQ ════════════════════════════════════════════════════════════ -->
    <section class="py-20 bg-white">
      <div class="max-w-3xl mx-auto px-4">
        <h2 class="text-3xl font-black text-center mb-10" x-text="faq.heading"></h2>
        <div class="space-y-3">
          <template x-for="item in faq.items" :key="item.q">
            <div class="border border-zinc-200 rounded-2xl overflow-hidden">
              <button onclick="toggleFAQ(this)"
                class="w-full px-6 py-4 text-left font-semibold flex justify-between items-center hover:bg-zinc-50 transition">
                <span x-text="item.q"></span>
                <span class="faq-icon text-emerald-600 text-xl font-light">+</span>
              </button>
              <div class="accordion-content px-6 text-zinc-600 text-sm" x-text="item.a"></div>
            </div>
          </template>
        </div>
      </div>
    </section>

    <!-- ══ FOOTER ══════════════════════════════════════════════════════════ -->
    <footer class="bg-zinc-900 text-white py-12 border-t border-zinc-800">
      <div class="max-w-7xl mx-auto px-4 grid md:grid-cols-3 gap-8">
        <div>
          <div class="flex items-center gap-3">
            <span class="text-2xl">🌿</span>
            <span class="font-black text-xl" x-text="brand"></span>
          </div>
          <p class="mt-3 text-zinc-400 text-sm" x-text="footer.tagline"></p>
          <div class="mt-4 flex gap-4">
            <a x-bind:href="zalo" target="_blank" class="text-2xl">💬</a>
            <a x-bind:href="messenger" target="_blank" class="text-2xl">📘</a>
          </div>
        </div>
        <div class="text-sm space-y-2 text-zinc-400">
          <p>📍 <span x-text="address"></span></p>
          <p>📞 <a x-bind:href="'tel:' + phone" class="underline" x-text="hotline"></a></p>
          <p class="text-emerald-400 font-semibold">
            <span x-text="footer.discountLabel"></span> <span x-text="footer.discountCode"></span>
          </p>
        </div>
        <div class="text-sm text-zinc-500">
          <p>© 2026 <span x-text="brand"></span>. <span x-text="footer.copyright"></span></p>
          <button onclick="window.scrollTo({top:0,behavior:'smooth'})"
            class="mt-4 bg-zinc-800 hover:bg-emerald-600 px-5 py-2.5 rounded-full text-white text-sm transition"
            x-text="footer.scrollTopBtn"></button>
        </div>
      </div>
    </footer>

    <!-- ══ STICKY CTA (mobile) ════════════════════════════════════════════ -->
    <div class="md:hidden sticky-cta bg-zinc-900 border border-emerald-600 text-white shadow-2xl rounded-2xl flex items-center gap-3 px-4 py-3 w-[92%]">
      <button onclick="scrollToForm()" class="flex-1 text-center font-bold text-sm" x-text="stickyCta"></button>
      <button onclick="window.location.href = 'tel:' + window.CLIENT.phone"
        class="bg-emerald-600 text-white w-10 h-10 rounded-xl flex items-center justify-center">📞</button>
    </div>

    <script>
      function scrollToForm() {
        document.getElementById("form").scrollIntoView({ behavior: "smooth" });
      }
      function handleSubmit(e) {
        e.preventDefault();
        const name = document.getElementById("name").value.trim();
        const phone = document.getElementById("phone").value.trim();
        if (name.length < 3) { alert(CLIENT.alerts.nameError); return; }
        if (phone.length < 9) { alert(CLIENT.alerts.phoneError); return; }
        alert(CLIENT.alerts.successMsg);
        e.target.reset();
      }
      function toggleFAQ(btn) {
        const content = btn.nextElementSibling;
        const icon = btn.querySelector(".faq-icon");
        if (content.style.maxHeight && content.style.maxHeight !== "0px") {
          content.style.maxHeight = "0px";
          icon.textContent = "+";
        } else {
          document.querySelectorAll(".accordion-content").forEach(c => c.style.maxHeight = "0px");
          document.querySelectorAll(".faq-icon").forEach(i => i.textContent = "+");
          content.style.maxHeight = content.scrollHeight + "px";
          icon.textContent = "−";
        }
      }
    </script>
  </body>
</html>
